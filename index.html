<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>DF Rugby — Asistencia</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --green-dark:   #1a472a;
    --green-mid:    #2d6a4f;
    --green-light:  #a8d5a2;
    --green-bg:     #f1f8f1;
    --green-border: #81c784;
    --orange-dark:  #e65100;
    --orange-bg:    #fff8f0;
    --orange-border:#ffb74d;
    --red-dark:     #b71c1c;
    --red-bg:       #fff5f5;
    --red-border:   #ef9a9a;
    --blue-dark:    #1565c0;
    --blue-bg:      #f0f7ff;
    --blue-border:  #90caf9;
    --gray-text:    #444;
    --gray-border:  #ddd;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f2f0;
    min-height: 100vh;
    color: var(--gray-text);
  }

  .screen { display: none; min-height: 100vh; flex-direction: column; }
  .screen.active { display: flex; }

  .header {
    background: var(--green-dark);
    padding: 16px 16px 14px;
    position: sticky; top: 0; z-index: 10;
  }
  .header-sub   { color: rgba(255,255,255,0.6); font-size: 11px; margin-bottom: 3px; }
  .header-title { color: #fff; font-size: 20px; font-weight: 600; }
  .header-meta  { color: var(--green-light); font-size: 12px; margin-top: 4px; }

  .pills { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
  .pill  { border-radius: 20px; padding: 3px 10px; font-size: 11px; font-weight: 600; }
  .pill-green  { background: rgba(168,213,162,0.25); color: #c8edc4; }
  .pill-orange { background: rgba(255,183,77,0.2);   color: #ffd699; }
  .pill-red    { background: rgba(239,154,154,0.2);  color: #ffaaaa; }
  .pill-blue   { background: rgba(144,202,249,0.2);  color: #aad4f5; }
  .pill-gray   { background: rgba(255,255,255,0.1);  color: rgba(255,255,255,0.5); }

  .list { flex: 1; padding: 10px; overflow-y: auto; }

  .player {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; border-radius: 13px; margin-bottom: 7px;
    border: 1px solid var(--gray-border); background: #fff;
    cursor: pointer; transition: transform 0.1s;
    user-select: none;
  }
  .player:active { transform: scale(0.97); }

  .player.s-presente      { background: var(--green-bg);  border-color: var(--green-border); }
  .player.s-lesionado     { background: var(--orange-bg); border-color: var(--orange-border); }
  .player.s-ausente       { background: var(--red-bg);    border-color: var(--red-border); }
  .player.s-ausente-aviso { background: var(--blue-bg);   border-color: var(--blue-border); }

  .avatar {
    width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; background: #ccc; color: #fff;
    transition: background 0.2s;
  }
  .player.s-presente      .avatar { background: var(--green-dark); }
  .player.s-lesionado     .avatar { background: var(--orange-dark); }
  .player.s-ausente       .avatar { background: var(--red-dark); }
  .player.s-ausente-aviso .avatar { background: var(--blue-dark); }

  .player-info { flex: 1; min-width: 0; }
  .player-name { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .player-nick { font-size: 12px; color: #888; margin-top: 1px; }
  .player.s-presente      .player-name { color: var(--green-dark); }
  .player.s-lesionado     .player-name { color: var(--orange-dark); }
  .player.s-ausente       .player-name { color: var(--red-dark); }
  .player.s-ausente-aviso .player-name { color: var(--blue-dark); }

  .status-chip {
    font-size: 11px; font-weight: 600; padding: 5px 10px; border-radius: 8px;
    white-space: nowrap; flex-shrink: 0;
    background: #eee; color: #999;
  }
  .player.s-presente      .status-chip { background: var(--green-dark);  color: #fff; }
  .player.s-lesionado     .status-chip { background: var(--orange-dark); color: #fff; }
  .player.s-ausente       .status-chip { background: var(--red-dark);    color: #fff; }
  .player.s-ausente-aviso .status-chip { background: var(--blue-dark);   color: #fff; }

  /* Badge para estados pre-cargados */
  .precargado {
    font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px;
    background: rgba(0,0,0,0.12); color: inherit;
    margin-left: 4px; vertical-align: middle; letter-spacing: 0.3px;
  }

  .save-bar {
    padding: 12px 14px; background: #fff; border-top: 1px solid var(--gray-border);
    position: sticky; bottom: 0;
  }
  .save-btn {
    width: 100%; padding: 16px; background: var(--green-dark); color: #fff;
    border: none; border-radius: 13px; font-size: 16px; font-weight: 600;
    cursor: pointer; transition: background 0.2s;
  }
  .save-btn:active   { background: var(--green-mid); }
  .save-btn:disabled { background: #aaa; cursor: default; }
  .cancel-btn {
    width: 100%; padding: 13px; background: transparent; color: #888;
    border: 1px solid var(--gray-border); border-radius: 13px;
    font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 8px;
    transition: background 0.1s;
  }
  .cancel-btn:active { background: #f5f5f5; }

  .modal-bg {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 100; align-items: flex-end; justify-content: center;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: #fff; border-radius: 20px 20px 0 0; padding: 20px 16px 32px;
    width: 100%; max-width: 480px;
  }
  .modal-handle      { width: 40px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 16px; }
  .modal-player-name { font-size: 15px; font-weight: 600; color: var(--green-dark); margin-bottom: 3px; }
  .modal-player-nick { font-size: 12px; color: #aaa; margin-bottom: 16px; }

  .opt {
    display: flex; align-items: center; gap: 14px;
    padding: 15px 14px; border-radius: 12px; margin-bottom: 8px;
    border: 1px solid var(--gray-border); background: #fff;
    cursor: pointer; transition: background 0.1s;
    font-size: 15px; font-weight: 500;
  }
  .opt:active  { background: #f5f5f5; }
  .opt-dot     { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
  .opt-present .opt-dot { background: var(--green-dark); }
  .opt-lesion  .opt-dot { background: var(--orange-dark); }
  .opt-ausente .opt-dot { background: var(--red-dark); }
  .opt-aviso   .opt-dot { background: var(--blue-dark); }

  #screen-login {
    background: var(--green-dark);
    justify-content: center; align-items: center; padding: 24px;
  }
  .login-logo {
    width: 70px; height: 70px; border-radius: 50%;
    background: rgba(255,255,255,0.15); display: flex; align-items: center;
    justify-content: center; margin: 0 auto 16px;
  }
  .login-title { color: #fff; font-size: 26px; font-weight: 700; text-align: center; }
  .login-sub   { color: var(--green-light); font-size: 14px; text-align: center; margin-top: 6px; margin-bottom: 36px; }
  .login-card  {
    background: #fff; border-radius: 18px; padding: 24px;
    width: 100%; max-width: 360px;
  }
  .login-label { font-size: 13px; color: #888; margin-bottom: 6px; font-weight: 500; }
  .login-input {
    width: 100%; padding: 13px 14px; border: 1px solid var(--gray-border);
    border-radius: 10px; font-size: 16px; margin-bottom: 16px;
    outline: none; transition: border-color 0.2s;
  }
  .login-input:focus { border-color: var(--green-dark); }
  .login-btn {
    width: 100%; padding: 15px; background: var(--green-dark); color: #fff;
    border: none; border-radius: 12px; font-size: 16px; font-weight: 600;
    cursor: pointer;
  }
  .login-error { color: #e53935; font-size: 13px; text-align: center; margin-top: 12px; min-height: 18px; }

  #screen-dates { background: #f0f2f0; }
  .date-list { padding: 12px; flex: 1; overflow-y: auto; }
  .date-card {
    background: #fff; border-radius: 13px; padding: 18px 16px;
    margin-bottom: 8px; border: 1px solid var(--gray-border);
    cursor: pointer; transition: all 0.1s;
    display: flex; align-items: center; justify-content: space-between;
  }
  .date-card:active  { background: var(--green-bg); border-color: var(--green-border); }
  .date-card-label   { font-size: 17px; font-weight: 500; color: var(--gray-text); }
  .date-card-sub     { font-size: 12px; color: #aaa; margin-top: 3px; }
  .date-arrow        { color: #ccc; font-size: 20px; }

  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: #323232; color: #fff; padding: 12px 20px; border-radius: 10px;
    font-size: 14px; font-weight: 500; z-index: 200;
    opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  .loading {
    display: flex; align-items: center; justify-content: center;
    flex: 1; flex-direction: column; gap: 12px; color: #aaa;
  }
  .spinner {
    width: 32px; height: 32px; border: 3px solid #eee;
    border-top-color: var(--green-dark); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="screen-login" class="screen active">
  <div style="width:100%;max-width:360px">
    <div class="login-logo">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
        <circle cx="18" cy="11" r="7" fill="white"/>
        <path d="M4 34c0-7.732 6.268-14 14-14s14 6.268 14 14" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      </svg>
    </div>
    <div class="login-title">DF Rugby</div>
    <div class="login-sub">Sistema de Asistencia</div>
    <div class="login-card">
      <div class="login-label">Usuario</div>
      <input id="login-user" class="login-input" type="text" autocapitalize="none"
             autocomplete="username" placeholder="managerm13">
      <div class="login-label">Contraseña</div>
      <input id="login-pass" class="login-input" type="password"
             autocomplete="current-password" placeholder="••••••">
      <button class="login-btn" onclick="doLogin()">Ingresar</button>
      <div id="login-error" class="login-error"></div>
    </div>
  </div>
</div>

<!-- DATE PICKER -->
<div id="screen-dates" class="screen">
  <div class="header">
    <div class="header-sub" id="dates-division">M13</div>
    <div class="header-title">Elegí la fecha</div>
    <div class="header-meta" id="dates-sheet-name"></div>
  </div>
  <div id="dates-loading" class="loading">
    <div class="spinner"></div>
    <span>Cargando fechas…</span>
  </div>
  <div id="date-list" class="date-list" style="display:none"></div>
</div>

<!-- ATTENDANCE -->
<div id="screen-attendance" class="screen">
  <div class="header">
    <div class="header-sub" id="att-date-label"></div>
    <div class="header-title">Asistencia M13</div>
    <div class="pills" id="att-pills"></div>
  </div>
  <div id="att-loading" class="loading">
    <div class="spinner"></div>
    <span>Cargando jugadores…</span>
  </div>
  <div id="player-list" class="list" style="display:none"></div>
  <div class="save-bar" id="save-bar" style="display:none">
    <button class="save-btn" id="save-btn" onclick="saveAttendance()">Guardar asistencia</button>
    <button class="cancel-btn" onclick="cancelAttendance()">Cancelar</button>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-player-name" id="modal-name"></div>
    <div class="modal-player-nick" id="modal-nick"></div>
    <div class="opt opt-present" onclick="setState('Presente')">
      <span class="opt-dot"></span>Presente
    </div>
    <div class="opt opt-lesion" onclick="setState('Lesionado Presente')">
      <span class="opt-dot"></span>Lesionado Presente
    </div>
    <div class="opt opt-ausente" onclick="setState('Ausente')">
      <span class="opt-dot"></span>Ausente
    </div>
    <div class="opt opt-aviso" onclick="setState('Ausente, Aviso')">
      <span class="opt-dot"></span>Ausente, Aviso
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzoGzO5d6lT-00JU_Ql1GDK9lHNhnG1Yv8bFOowsA_PsidaxLwbdPOpLM3kX6APGF1O/exec";

let state = {
  username:     "",
  password:     "",
  division:     "",
  players:      [],
  dates:        [],
  selectedDate: null,
  sheetName:    ""
};

const STATE_CLASS = {
  "Presente":           "s-presente",
  "Lesionado Presente": "s-lesionado",
  "Ausente":            "s-ausente",
  "Ausente, Aviso":     "s-ausente-aviso"
};

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

async function api(payload) {
  const body = JSON.stringify({
    ...payload,
    username: state.username,
    password: state.password
  });
  const res  = await fetch(API_URL, {
    method:  "POST",
    headers: { "Content-Type": "text/plain" },
    body
  });
  return JSON.parse(await res.text());
}

// ── LOGIN ──────────────────────────────────────────────────
async function doLogin() {
  const username = document.getElementById('login-user').value.trim().toLowerCase();
  const password = document.getElementById('login-pass').value.trim();
  const errEl    = document.getElementById('login-error');
  errEl.textContent = "";

  if (!username || !password) { errEl.textContent = "Ingresá usuario y contraseña"; return; }

  try {
    const res  = await fetch(API_URL, {
      method:  "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ action: "login", username, password })
    });
    const data = JSON.parse(await res.text());
    if (!data.ok) { errEl.textContent = data.error; return; }

    state.username = username;
    state.password = password;
    state.division = data.division;
    loadDatesScreen();
  } catch(e) {
    errEl.textContent = "Error de conexión. Revisá el link de la app.";
  }
}

document.getElementById('login-pass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// ── DATE PICKER ────────────────────────────────────────────
async function loadDatesScreen() {
  showScreen('dates');
  document.getElementById('dates-division').textContent  = state.division;
  document.getElementById('dates-loading').style.display = 'flex';
  document.getElementById('date-list').style.display     = 'none';

  try {
    const data = await api({ action: "getDates" });
    if (!data.ok) { showToast("Error: " + data.error); return; }
    state.dates     = data.dates;
    state.sheetName = data.sheetName;
    document.getElementById('dates-sheet-name').textContent = data.sheetName;
    renderDates(data.dates);
  } catch(e) {
    showToast("Error cargando fechas");
  }
}

const DAYS_ES   = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
const MONTHS_ES = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];

function renderDates(dates) {
  document.getElementById('dates-loading').style.display = 'none';
  const list = document.getElementById('date-list');
  list.style.display = 'block';
  list.innerHTML = '';

  if (dates.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:40px;color:#aaa">No hay fechas cargadas en este mes</div>';
    return;
  }

  const today = new Date();
  today.setHours(0,0,0,0);

  dates.forEach(d => {
    const el = document.createElement('div');
    el.className = 'date-card';

    let label = d.display;
    let sub   = '';
    let badge = '';

    if (d.date && d.date.match(/^\d{4}-\d{2}-\d{2}$/)) {
      const dt = new Date(d.date + 'T12:00:00');
      label = DAYS_ES[dt.getDay()] + ' ' + dt.getDate() + ' de ' + MONTHS_ES[dt.getMonth()];
      sub   = d.display;

      // Indicar si es futura
      if (dt > today) {
        badge = '<span style="font-size:10px;font-weight:600;color:#1565c0;background:#f0f7ff;padding:2px 8px;border-radius:10px;margin-left:8px">próxima</span>';
      } else if (dt.getTime() === today.getTime()) {
        badge = '<span style="font-size:10px;font-weight:600;color:#1a472a;background:#e8f5e9;padding:2px 8px;border-radius:10px;margin-left:8px">hoy</span>';
      }
    }

    el.innerHTML =
      '<div style="display:flex;align-items:center">' +
        '<div>' +
          '<div class="date-card-label">' + label + badge + '</div>' +
          (sub ? '<div class="date-card-sub">' + sub + '</div>' : '') +
        '</div>' +
      '</div>' +
      '<div class="date-arrow">›</div>';
    el.onclick = () => selectDate(d);
    list.appendChild(el);
  });
}

async function selectDate(dateObj) {
  state.selectedDate = dateObj;
  await loadAttendanceScreen();
}

// ── ATTENDANCE ─────────────────────────────────────────────
async function loadAttendanceScreen() {
  showScreen('attendance');
  document.getElementById('att-loading').style.display = 'flex';
  document.getElementById('player-list').style.display = 'none';
  document.getElementById('save-bar').style.display    = 'none';

  const d = state.selectedDate;
  let label = d.display;
  if (d.date && d.date.match(/^\d{4}-\d{2}-\d{2}$/)) {
    const dt = new Date(d.date + 'T12:00:00');
    label = DAYS_ES[dt.getDay()] + ' ' + dt.getDate() + ' de ' + MONTHS_ES[dt.getMonth()];
  }
  document.getElementById('att-date-label').textContent = label;

  try {
    // Mandamos dateCol y sheetName para que el servidor traiga los estados ya cargados
    const data = await api({
      action:    "getPlayers",
      dateCol:   state.selectedDate.col,
      sheetName: state.sheetName
    });
    if (!data.ok) { showToast("Error: " + data.error); return; }

    // El servidor ya manda el status pre-cargado (o null si está vacío)
    state.players = data.players;
    renderPlayers();
  } catch(e) {
    showToast("Error cargando jugadores");
  }
}

function renderPlayers() {
  document.getElementById('att-loading').style.display = 'none';
  const list = document.getElementById('player-list');
  list.style.display = 'block';
  document.getElementById('save-bar').style.display = 'block';
  list.innerHTML = '';

  state.players.forEach((p, idx) => {
    const initials  = p.name.split(' ').slice(0,2).map(w => w[0].toUpperCase()).join('');
    const cssClass  = p.status ? ' ' + STATE_CLASS[p.status] : '';
    const chipLabel = p.status || 'Sin marcar';
    const precargadoBadge = p.status
      ? '<span class="precargado">planilla</span>'
      : '';

    const el = document.createElement('div');
    el.className = 'player' + cssClass;
    el.id = 'player-' + idx;
    el.onclick = () => openModal(idx);
    el.innerHTML =
      '<div class="avatar">' + initials + '</div>' +
      '<div class="player-info">' +
        '<div class="player-name">' + p.name + '</div>' +
        '<div class="player-nick">' + (p.apodo ? '"' + p.apodo + '"' : (p.novedad || '&nbsp;')) + '</div>' +
      '</div>' +
      '<div class="status-chip">' + chipLabel + precargadoBadge + '</div>';
    list.appendChild(el);
  });

  updatePills();
}

function updatePlayerEl(idx) {
  const p  = state.players[idx];
  const el = document.getElementById('player-' + idx);
  if (!el) return;
  el.className = 'player' + (p.status ? ' ' + STATE_CLASS[p.status] : '');
  el.querySelector('.status-chip').textContent = p.status || 'Sin marcar';
  updatePills();
}

function updatePills() {
  const c = { presente:0, lesionado:0, ausente:0, aviso:0, sin:0 };
  state.players.forEach(p => {
    if      (!p.status)                         c.sin++;
    else if (p.status === "Presente")           c.presente++;
    else if (p.status === "Lesionado Presente") c.lesionado++;
    else if (p.status === "Ausente")            c.ausente++;
    else if (p.status === "Ausente, Aviso")     c.aviso++;
  });
  let html = '';
  if (c.presente)  html += '<span class="pill pill-green">'  + c.presente  + ' Presente</span>';
  if (c.lesionado) html += '<span class="pill pill-orange">' + c.lesionado + ' Lesionado Presente</span>';
  if (c.ausente)   html += '<span class="pill pill-red">'    + c.ausente   + ' Ausente</span>';
  if (c.aviso)     html += '<span class="pill pill-blue">'   + c.aviso     + ' Ausente, Aviso</span>';
  if (c.sin)       html += '<span class="pill pill-gray">'   + c.sin       + ' sin marcar</span>';
  document.getElementById('att-pills').innerHTML = html;
}

// ── MODAL ──────────────────────────────────────────────────
let activePlayerIdx = null;

function openModal(idx) {
  activePlayerIdx = idx;
  const p = state.players[idx];
  document.getElementById('modal-name').textContent = p.name;
  document.getElementById('modal-nick').textContent = p.apodo ? '"' + p.apodo + '"' : '';
  document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
  document.getElementById('modal').classList.remove('open');
}

function setState(status) {
  if (activePlayerIdx === null) return;
  state.players[activePlayerIdx].status = status;
  updatePlayerEl(activePlayerIdx);
  closeModal();
}

// ── SAVE ───────────────────────────────────────────────────
async function saveAttendance() {
  const marked = state.players.filter(p => p.status);
  if (marked.length === 0) {
    showToast("Marcá al menos un jugador antes de guardar");
    return;
  }

  const btn = document.getElementById('save-btn');
  btn.disabled    = true;
  btn.textContent = "Guardando…";

  const attendance = state.players
    .filter(p => p.status)
    .map(p => ({ row: p.row, state: p.status }));

  try {
    const data = await api({
      action:    "saveAttendance",
      attendance,
      dateCol:   state.selectedDate.col,
      sheetName: state.sheetName
    });

    if (!data.ok) {
      showToast("Error al guardar: " + data.error);
      btn.disabled    = false;
      btn.textContent = "Guardar asistencia";
      return;
    }

    btn.textContent      = "✓ Guardado en Google Sheets";
    btn.style.background = "#2e7d32";
    showToast(data.saved + " registros guardados");

    setTimeout(() => {
      btn.disabled         = false;
      btn.textContent      = "Guardar asistencia";
      btn.style.background = "";
    }, 3000);

  } catch(e) {
    showToast("Error de conexión al guardar");
    btn.disabled    = false;
    btn.textContent = "Guardar asistencia";
  }
}

// ── CANCEL ─────────────────────────────────────────────────
function cancelAttendance() {
  loadDatesScreen();
}

// ── TOAST ──────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
